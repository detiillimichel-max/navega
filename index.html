<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Navegue</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#8b5cf6">
<style>:root{--bg:#0b1220;--card:#1f2937;--accent:#8b5cf6}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#e5e7eb;font-family:system-ui}header{position:sticky;top:0;background:#111827;padding:14px;z-index:10}h1{margin:0 0 10px;font-size:22px;display:flex;gap:8px}.search{position:relative;display:flex;gap:8px}input{flex:1;padding:12px 40px 12px 12px;border-radius:12px;border:1px solid #374151;background:#0f172a;color:#fff;font-size:15px}.clear{position:absolute;right:108px;top:50%;transform:translateY(-50%);background:none;border:none;color:#9ca3af;font-size:20px;cursor:pointer;display:none}button{padding:12px 16px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-weight:600;cursor:pointer}.tabs{display:flex;gap:8px;margin:12px 14px;overflow:auto}.tab{padding:8px 14px;border-radius:20px;background:#1f2937;color:#9ca3af;cursor:pointer;white-space:nowrap}.tab.active{background:var(--accent);color:#fff}main{padding:0 14px 40px}.card{background:var(--card);border-radius:16px;padding:14px;margin-bottom:12px}.result-title{font-weight:600;margin-bottom:6px}.result-link{color:#8b5cf6;font-size:13px;text-decoration:none}.news{display:flex;gap:12px}.news img{width:100px;height:75px;object-fit:cover;border-radius:8px;flex-shrink:0}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:12px 0}.app{display:flex;flex-direction:column;align-items:center;gap:6px;text-decoration:none;color:#e5e7eb}.app-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px}.app-label{font-size:11px;opacity:.8;text-align:center}.section-title{font-size:12px;text-transform:uppercase;opacity:.6;margin:20px 0 8px;font-weight:700;letter-spacing:.05em}</style>
</head>
<body>
<header><h1>🌐 Navegue</h1><div class="search"><input id="q" placeholder="Pesquisar..."><button class="clear" id="clear">×</button><button id="go">Buscar</button></div></header>
<div class="tabs"><div class="tab active" data-t="web">Buscar</div><div class="tab" data-t="news">Notícias</div><div class="tab" data-t="video">Vídeos</div><div class="tab" data-t="clima">Clima</div></div>
<main id="out"></main>
<script>
const out=document.getElementById('out'),q=document.getElementById('q'),clear=document.getElementById('clear');let tab='web';
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');tab=t.dataset.t;if(q.value)buscar()});
document.getElementById('go').onclick=buscar;q.onkeydown=e=>e.key==='Enter'&&buscar();q.oninput=()=>clear.style.display=q.value?'block':'none';clear.onclick=()=>{q.value='';clear.style.display='none';showHome()};

function showHome(){
out.innerHTML=`
<div class="section-title">⚡ Atalhos</div>
<div class="grid">
<a class="app" href="https://www.google.com" target="_blank"><div class="app-icon" style="background:#fff">🔍</div><span class="app-label">Google</span></a>
<a class="app" href="https://www.youtube.com" target="_blank"><div class="app-icon" style="background:#ff0000">▶️</div><span class="app-label">YouTube</span></a>
<a class="app" href="https://web.whatsapp.com" target="_blank"><div class="app-icon" style="background:#25d366">💬</div><span class="app-label">WhatsApp</span></a>
<a class="app" href="https://github.com" target="_blank"><div class="app-icon" style="background:#24292e">🐙</div><span class="sc-label">GitHub</span></a>
<a class="app" href="https://instagram.com" target="_blank"><div class="app-icon" style="background:linear-gradient(45deg,#f09433,#e6683c,#dc2743)">📸</div><span class="app-label">Instagram</span></a>
<a class="app" href="https://maps.google.com" target="_blank"><div class="app-icon" style="background:#4285f4">🗺️</div><span class="app-label">Maps</span></a>
<a class="app" href="https://mercadolivre.com.br" target="_blank"><div class="app-icon" style="background:#ffe600">🛒</div><span class="app-label">ML</span></a>
<a class="app" href="https://pt.wikipedia.org" target="_blank"><div class="app-icon" style="background:#fff">📖</div><span class="app-label">Wiki</span></a>
</div>

<div class="section-title">🚀 Meus Apps</div>
<div class="grid">
<a class="app" href="https://detiillimichel-max.github.io/navegador-navegue-gemi/index.html" target="_blank"><div class="app-icon" style="background:#1a73e8">🌐</div><span class="app-label">Navegue Gemi</span></a>
<a class="app" href="https://vibe-mensagens.vercel.app" target="_blank"><div class="app-icon" style="background:#8b5cf6">💬</div><span class="app-label">Vibe</span></a>
<a class="app" href="https://oio-fam.lovable.app/" target="_blank"><div class="app-icon" style="background:#10b981">👨‍👩‍👧</div><span class="app-label">OIO Fam</span></a>
<a class="app" href="https://detiillimichel-max.github.io/Nota-adesiva/" target="_blank"><div class="app-icon" style="background:#fbbf24">📝</div><span class="app-label">Notas</span></a>
<a class="app" href="https://telegrafo-chat.vercel.app/" target="_blank"><div class="app-icon" style="background:#0ea5e9">📡</div><span class="app-label">Telégrafo</span></a>
<a class="app" href="https://detiillimichel-max.github.io/R-dio-America/" target="_blank"><div class="app-icon" style="background:#ef4444">📻</div><span class="app-label">Rádio</span></a>
<a class="app" href="https://detiillimichel-max.github.io/Calculadora-simples/" target="_blank"><div class="app-icon" style="background:#6b7280">🔢</div><span class="app-label">Calc</span></a>
<a class="app" href="https://navegue.vercel.app" target="_blank"><div class="app-icon" style="background:#000">🚀</div><span class="app-label">Navegue</span></a>
</div>

<div class="section-title">🎮 Meus Jogos</div>
<div class="card" style="padding:10px">
<a class="result-link" href="https://detiillimichel-max.github.io/hubs-de-jogos/" target="_blank">🎮 Hub de Jogos</a><br>
<a class="result-link" href="https://detiillimichel-max.github.io/suko-de-fruta/" target="_blank">🍉 Frutos</a><br>
<a class="result-link" href="https://detiillimichel-max.github.io/palavra-da-biblia/" target="_blank">📖 Quiz Bíblico</a><br>
<a class="result-link" href="https://detiillimichel-max.github.io/show-b-blico/" target="_blank">✝️ Show Bíblico</a><br>
<a class="app" href="https://detiillimichel-max.github.io/bubble-shooter/" target="_blank">🫧 Bubble Shooter</a><br>
<a class="result-link" href="https://detiillimichel-max.github.io/trilhasb-blicas/" target="_blank">🗺️ Trilhas Bíblicas</a>
</div>
`;
}
showHome();

async function buscar(){const query=q.value.trim();if(!query)return;out.innerHTML='Carregando...';if(tab==='web'){let h='';try{const ddg=await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`).then(r=>r.json());if(ddg.AbstractText)h+=`<div class="card"><div class="result-title">${ddg.Heading}</div><div>${ddg.AbstractText}</div></div>`}catch{}try{const w=await fetch(`https://pt.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`).then(r=>r.ok?r.json():null);if(w&&w.extract)h+=`<div class="card"><div class="result-title">${w.title}</div><div>${w.extract}</div><a class="result-link" href="${w.content_urls.desktop.page}" target="_blank">Wikipedia →</a></div>`}catch{}h+=`<div class="card"><a class="result-link" href="https://www.google.com/search?q=${encodeURIComponent(query)}" target="_blank">Google →</a> • <a class="result-link" href="https://duckduckgo.com/?q=${encodeURIComponent(query)}" target="_blank">DuckDuckGo →</a></div>`;out.innerHTML=h}if(tab==='news'){const d=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=pt-BR`).then(r=>r.json());out.innerHTML=d.items.slice(0,10).map(i=>`<div class="card news"><img src="${i.thumbnail||'https://via.placeholder.com/100'}" onerror="this.style.display='none'"><div><div class="result-title">${i.title}</div><a class="result-link" href="${i.link}" target="_blank">Ler →</a></div></div>`).join('')}if(tab==='video'){out.innerHTML=`<div class="card"><a class="result-link" href="https://www.youtube.com/results?search_query=${encodeURIComponent(query)}" target="_blank">YouTube →</a></div><div class="card"><a class="result-link" href="https://duckduckgo.com/?q=${encodeURIComponent(query)}&iax=videos&ia=videos" target="_blank">Vídeos →</a></div>`}if(tab==='clima'){const g=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1`).then(r=>r.json());const {latitude,longitude,name}=g.results[0];const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m&daily=temperature_2m_max,temperature_2m_min&timezone=auto`).then(r=>r.json());out.innerHTML=`<div class="card"><div class="result-title">${name}</div><div style="font-size:28px">${Math.round(w.current.temperature_2m)}°C</div></div><div class="card">${w.daily.time.slice(0,5).map((d,i)=>`<div>${new Date(d).toLocaleDateString('pt-BR',{weekday:'short'})}: ${Math.round(w.daily.temperature_2m_min[i])}°/${Math.round(w.daily.temperature_2m_max[i])}°</div>`).join('')}</div>`}}
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js')
</script>
</body>
</html>
